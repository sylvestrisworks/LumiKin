name: Auto-review pending games

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every night

  workflow_dispatch:
    inputs:
      limit:
        description: 'Max games to review (default: 20)'
        required: false
        default: '20'
      model:
        description: 'Model override (flash or pro)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — score but skip DB writes (true/false)'
        required: false
        default: 'false'

jobs:
  review:
    name: Review pending games
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      RAWG_API_KEY:      ${{ secrets.RAWG_API_KEY }}
      GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
      NODE_ENV:          production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/gcloud-credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-credentials.json" >> $GITHUB_ENV

      - name: Run auto-review
        run: |
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          MODEL="${{ github.event.inputs.model || '' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--provider google --limit $LIMIT"

          if [ -n "$MODEL" ]; then
            ARGS="$ARGS --model $MODEL"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: auto-review-pending.ts $ARGS"
          node node_modules/tsx/dist/cli.cjs scripts/auto-review-pending.ts $ARGS
