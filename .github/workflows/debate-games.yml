name: Debate Games

on:
  schedule:
    - cron: '45 */2 * * *'  # :45 every 2h
  workflow_dispatch:

jobs:
  debate:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 8 games × ~5 min/game = 40 min max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debate games
        env:
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: node node_modules/tsx/dist/cli.cjs scripts/debate-games-cron.ts
