name: Fetch Games

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch games from RAWG
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: node node_modules/tsx/dist/cli.cjs scripts/fetch-games-cron.ts
