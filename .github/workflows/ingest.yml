name: Ingest Games

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Check and run ingest
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "APP_URL length: ${#APP_URL}"
          echo "CRON_SECRET length: ${#CRON_SECRET}"

          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is missing or empty!"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is missing or empty!"
            exit 1
          fi

          TARGET_URL="${APP_URL}/api/cron/ingest-games"
          echo "Target URL: $TARGET_URL"

          if [[ ! "$TARGET_URL" =~ ^https?:// ]]; then
            echo "::error::URL does not start with http:// or https://: $TARGET_URL"
            exit 1
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${TARGET_URL}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Ingest failed with status $HTTP_CODE"
            exit 1
          fi
