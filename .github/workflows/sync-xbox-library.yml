name: Sync Xbox Library

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily (after Epic 03:30 / GOG 03:45)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-xbox-library cron
        run: |
          curl -s -f -X GET \
            "${{ secrets.APP_URL }}/api/cron/sync-xbox-library" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
