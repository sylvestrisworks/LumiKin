name: Translate Content

on:
  schedule:
    - cron: '5 */2 * * *'  # :05 every 2h — runs 20 min after debate-games (:45) settles
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Run translate-content
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then echo "::error::APP_URL missing"; exit 1; fi
          if [ -z "$CRON_SECRET" ]; then echo "::error::CRON_SECRET missing"; exit 1; fi

          RESPONSE=$(curl -s --max-time 290 -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/translate-content")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::translate-content failed with status $HTTP_CODE"
            exit 1
          fi
