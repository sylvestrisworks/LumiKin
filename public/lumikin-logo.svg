<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Wordmark — "LumiKin" set as an editorial nameplate in Fraunces
    (falls back to Georgia / serif when Fraunces isn't installed), in ink.
    A small accent-red four-pointed spark sits as a superscript colophon
    mark after the word — a printer's dingbat, not a separate icon.
  -->
  <text
    x="2"
    y="34"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="600"
    letter-spacing="-0.5"
  >
    <tspan fill="#14110f">LumiKin</tspan><tspan baseline-shift="super" font-size="13" dx="1" fill="#c8102e">&#10022;</tspan>
  </text>
</svg>
